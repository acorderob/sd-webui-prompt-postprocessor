yaml:
  wildcard1:
    - "'First wildcard'$$"
    - choice1
    - choice2
    - choice3

  wildcard2:
    - ~r2-3'Wildcard description'$$-$$
    - "'label1,label2'4::choice1"
    - "3:: choice2 "
    - { labels: ["label1", "label3"], weight: 2, content: choice3 }
    - 5 if _is_sd1::choice4

  wildcard2bis:
    - __1$$yaml/wildcard2'^yaml/wildcard2bis'__bis

  wildcard2bisbis:
    - __1$$yaml/wildcard2bis'#^yaml/wildcard2bisbis'__bis

  wildcard3:
    - __2$$,$$yaml/wildcard2__

  wildcard4: inline text

  wildcard5: inline ${var:default}

  wildcard6:
    - { weight: 2, text: choice1 }
    - { weight: 3, content: choice2 }
    - { text: choice3 }
    - { weight: 4, if: _is_ssd, text: choice4 }

  wildcard7:
    - { description: "Lora wildcard" }
    - <lora:test1:1>
    - <lora:test2:1>
    - <lora:test3:1>

  wildcardAt:
    - (choice1:0.5)
    - (choice2:1.5)
    - (choice3:1)

  wildcardAtBracket:
    - "[the content]"

  wildcardAlt:
    - "[cat|dog]"

  wildcardSched:
    - "[cat:dog:0.5]"

  wildcardPS:
    - {
        sampler: "~",
        repeating: false,
        optional: false,
        count: 2,
        prefix: "prefix{1|2}-",
        suffix: "-suffix",
        separator: "/",
      }
    - { weight: 3, text: choice1 }
    - { weight: 2, text: choice2 }
    - { weight: 1, text: choice3 }

  wildcardPS2:
    - {
        prefix: "(prefix{1|2}-",
        suffix: "-suffix:1.5)",
      }
    - { text: choice1 }
    - { text: choice2 }
    - { text: choice3 }
  
  wildcardContainer:
    - {
        count: 2,
        container: "(prefix{1|2}-${_choices[&'/']}-suffix:1.5)",
      }
    - { weight: 3, text: choice1 }
    - { weight: 2, text: choice2 }
    - { weight: 1, text: choice3 }

  more_nested:
    even_more_nested: # this would be __yaml/more_nested/even_more_nested__
      - one
      - two

  anonwildcards:
    - one
    - two
    - # choice without options and anonymous wildcard
      - three
      - four
    - 3 if _is_sdxl: # choice with options and anonymous wildcard
      - five
      - six
    - { weight: 1, text: [seven, eight] } # anonymous wildcard used in a choice in object format
    - # choice without options and anonymous wildcard with parameters
      - { count: 2, prefix: "#" }
      - nine
      - ten

  empty_wildcard:
    - o$$ # parameters: optional
    - if false::1
    - if false::2
    - if false::3
    - if _sd in ("test1", "test2")::4
    - if (false or false)::5

  circular1:
    - 5::__yaml/circular2__
    - choice1
    - choice2

  circular2:
    - choice3
    - choice4
    - 5::__yaml/circular1__

  including:
    - "%0.5::include yaml/wildcard1"
    - choice4
    - choice5
    - "%0.2::include yaml/wildcard7"

  including1:
    - choice1
    - choice2
    - "%5::include yaml/including2"

  including2:
    - choice3
    - choice4
    - "%5::include yaml/including1"
